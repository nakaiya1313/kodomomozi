<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>こども文字タッチ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="ひらがな・カタカナをタッチで覚える子供向けブラウザ学習ゲームです。">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fff7dc;color:#333}
#app{width:100vw;height:100dvh;display:flex;flex-direction:column;background:linear-gradient(#fff8df,#ffe7b3)}
.ad-small{height:50px;min-height:50px;max-height:50px;width:100%;background:rgba(255,255,255,.78);border-bottom:1px dashed rgba(0,0,0,.16);display:flex;align-items:center;justify-content:center;color:#777;font-size:12px;overflow:hidden;flex-shrink:0}
.ad-small-inner{width:320px;height:50px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.ad-large{width:300px;height:250px;position:relative;z-index:1;margin:14px auto;border:2px dashed rgba(0,0,0,.18);border-radius:16px;background:rgba(255,255,255,.75);display:flex;align-items:center;justify-content:center;color:#777;font-size:13px;overflow:hidden}
#topArea{flex:0 0 auto;padding:6px 8px 4px;display:flex;flex-direction:column;align-items:center;gap:5px}
#statusBar{width:min(98vw,760px);display:flex;justify-content:space-between;align-items:center;gap:6px;font-weight:900;font-size:12px}
.pill{background:rgba(255,255,255,.86);border:2px solid rgba(0,0,0,.07);border-radius:999px;padding:4px 8px;white-space:nowrap}
#questionCard{width:min(98vw,760px);background:rgba(255,255,255,.94);border:3px solid #ffcf6b;border-radius:18px;padding:7px 8px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.08)}
#emoji{font-size:clamp(52px,14vw,96px);line-height:1}
#circleHint{font-size:clamp(22px,6vw,36px);letter-spacing:.08em;color:#ff9d00;font-weight:900;line-height:1.1}
#answerDisplay{min-height:34px;font-size:clamp(24px,6.2vw,40px);letter-spacing:.08em;font-weight:900;color:#333;line-height:1.15}
#message{min-height:22px;font-size:16px;font-weight:900;color:#ef6c00;line-height:1.2}
#controls{width:min(98vw,760px);display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
button{border:none;border-radius:999px;font-weight:900;padding:8px 6px;font-size:12px;color:#333;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.12);cursor:pointer}
button.primary{background:#ffcf6b}button.on{background:#8ee6a4}button.danger{background:#ffb0a6}
#keyboardArea{flex:1 1 auto;min-height:0;padding:6px 6px 8px;background:rgba(255,255,255,.4);border-top:2px solid rgba(255,190,75,.35);overflow:hidden;display:flex;flex-direction:column;gap:6px}
#modifierRow{width:min(98vw,820px);margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;flex-shrink:0}
.modBtn{background:#dff0ff;border:2px solid rgba(0,0,0,.08);border-radius:14px;min-height:40px;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;gap:2px;white-space:nowrap;padding:2px;box-shadow:0 2px 5px rgba(0,0,0,.08)}
.modBtn .mk{font-size:21px;line-height:1}
.modBtn .lb{font-size:13px;line-height:1}
.modBtn *{pointer-events:none}
.modBtn:active,.kanaBtn:active{transform:scale(.96);background:#ffefb5}
#kanaGrid{width:min(98vw,820px);margin:0 auto;display:grid;grid-template-columns:repeat(10,1fr);grid-auto-rows:1fr;gap:5px;flex:1;min-height:0}
.kanaBtn{border-radius:12px;background:#fff;border:2px solid rgba(0,0,0,.08);box-shadow:0 2px 5px rgba(0,0,0,.08);font-size:clamp(20px,5.1vw,30px);font-weight:900;display:flex;align-items:center;justify-content:center;min-width:0;min-height:0}
.empty{visibility:hidden}
#overlay{position:fixed;inset:0;z-index:20;background:rgba(255,247,220,.97);display:flex;align-items:center;justify-content:center;padding:16px;overflow:auto}
.panel{width:min(94vw,520px);max-height:96dvh;overflow:auto;background:#fff;border:4px solid #ffcf6b;border-radius:28px;padding:20px 16px;text-align:center;box-shadow:0 12px 28px rgba(0,0,0,.18)}
.panel h1{margin:0 0 8px;font-size:34px;color:#ef6c00}.panel p{margin:8px 0;line-height:1.65;font-size:15px}
.startButtons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 0 10px;position:relative;z-index:9999}.bigButton{padding:16px 10px;font-size:19px;background:#ffcf6b;position:relative;z-index:10000}
@media(max-height:670px){
  .ad-large{height:180px}
  #emoji{font-size:48px}
  #circleHint{font-size:22px}
  #answerDisplay{font-size:24px;min-height:28px}
  #message{font-size:14px;min-height:18px}
  button{font-size:11px;padding:6px 4px}
  .modBtn{min-height:32px;font-size:13px}
  .modBtn .mk{font-size:18px}
  .modBtn .lb{font-size:12px}
}
@media(max-width:380px){
  #controls{gap:4px}
  button{font-size:11px;padding:7px 3px}
  #kanaGrid{gap:4px}
  .kanaBtn{border-radius:10px}
  .modBtn{font-size:12px;gap:1px}
  .modBtn .mk{font-size:18px}
  .modBtn .lb{font-size:11px}
}
</style>
</head>
<body>
<div id="app">
  <div class="ad-small">
    <div class="ad-small-inner">
      <!-- 小さい広告枠：忍者AdMax 320×50コードをここに入れてください -->
      <!-- admax -->
<script src="https://adm.shinobi.jp/s/333a2c8a3bee0f79e94c33161f546957"></script>
<!-- admax -->
    </div>
  </div>

  <div id="topArea">
    <div id="statusBar">
      <div class="pill" id="modeText">ひらがな</div>
      <div class="pill" id="scoreText">せいかい 0</div>
      <div class="pill" id="missText">ミス 0/5</div>
    </div>

    <div id="questionCard">
      <div id="emoji">🐰</div>
      <div id="circleHint">○○○</div>
      <div id="answerDisplay">＿ ＿ ＿</div>
      <div id="message">なまえをいれてね</div>
    </div>

    <div id="controls">
      <button class="primary" id="modeBtn">カタカナ</button>
      <button id="soundBtn" class="on">おとON</button>
      <button id="backBtn">1つけす</button>
      <button class="danger" id="clearBtn">ぜんぶ</button>
      <button id="nextBtn">つぎ</button><button id="answerBtn">こたえ</button><button id="titleBtn">もどる</button>
    </div>
  </div>

  <div id="keyboardArea">
    <div id="modifierRow">
      <div class="modBtn" id="dakutenBtn"><span class="mk">゛</span><span class="lb">つける</span></div>
      <div class="modBtn" id="handakuBtn"><span class="mk">゜</span><span class="lb">つける</span></div>
      <div class="modBtn" id="smallBtn"><span class="lb">こもじ</span></div>
      <div class="modBtn" id="longBtn"><span class="mk">ー</span><span class="lb">のばす</span></div>
    </div>
    <div id="kanaGrid"></div>
  </div>

  <div id="overlay">
    <div class="panel">
      <h1>こども<br>もじタッチ</h1>
      <p>えをみて、したのもじをタッチしよう。<br>ひらがな・カタカナのれんしゅうができます。</p>
      <div class="startButtons">
        <button class="bigButton" type="button" onclick="startGame('easy')">やさしい</button>
        <button class="bigButton" type="button" onclick="startGame('normal')">ふつう</button>
        <button class="bigButton" type="button" onclick="startGame('hard')">むずかしい</button>
      </div>

      <div class="ad-large">
        <!-- おおきいこうこく 300×250 -->
        <!-- admax -->
<script src="https://adm.shinobi.jp/s/7b3a5ddb43f4cb9eadb45b1c506ee384"></script>
<!-- admax -->
      </div>
       <p>※画像は絵文字を参照しているので使用するスマホ等にて画像が違ってきます。分かりにくい画像あったらごめんなさい。</p>
    </div>
  </div>
</div>

const hiraGrid=[
["わ","ら","や","ま","は","な","た","さ","か","あ"],
["","り","","み","ひ","に","ち","し","き","い"],
["を","る","ゆ","む","ふ","ぬ","つ","す","く","う"],
["","れ","","め","へ","ね","て","せ","け","え"],
["ん","ろ","よ","も","ほ","の","と","そ","こ","お"]
];

["ワ","ラ","ヤ","マ","ハ","ナ","タ","サ","カ","ア"],
["","リ","","ミ","ヒ","ニ","チ","シ","キ","イ"],
["ヲ","ル","ユ","ム","フ","ヌ","ツ","ス","ク","ウ"],
["","レ","","メ","ヘ","ネ","テ","セ","ケ","エ"],
["ン","ロ","ヨ","モ","ホ","ノ","ト","ソ","コ","オ"]
];

const dakutenMap={
"か":"が","き":"ぎ","く":"ぐ","け":"げ","こ":"ご","さ":"ざ","し":"じ","す":"ず","せ":"ぜ","そ":"ぞ","た":"だ","ち":"ぢ","つ":"づ","て":"で","と":"ど","は":"ば","ひ":"び","ふ":"ぶ","へ":"べ","ほ":"ぼ",
"カ":"ガ","キ":"ギ","ク":"グ","ケ":"ゲ","コ":"ゴ","サ":"ザ","シ":"ジ","ス":"ズ","セ":"ゼ","ソ":"ゾ","タ":"ダ","チ":"ヂ","ツ":"ヅ","テ":"デ","ト":"ド","ハ":"バ","ヒ":"ビ","フ":"ブ","ヘ":"ベ","ホ":"ボ"

"は":"ぱ","ひ":"ぴ","ふ":"ぷ","へ":"ぺ","ほ":"ぽ",

"あ":"ぁ","い":"ぃ","う":"ぅ","え":"ぇ","お":"ぉ","つ":"っ","や":"ゃ","ゆ":"ゅ","よ":"ょ",
"ア":"ァ","イ":"ィ","ウ":"ゥ","エ":"ェ","オ":"ォ","ツ":"ッ","ヤ":"ャ","ユ":"ュ","ヨ":"ョ"
};

let mode="hira",soundOn=true,current=null,input="",score=0,miss=0,maxMiss=5,gameLevel="easy",used=[],checkTimer=null;
const kanaGridEl=document.getElementById("kanaGrid"),emojiEl=document.getElementById("emoji"),circleHint=document.getElementById("circleHint"),answerDisplay=document.getElementById("answerDisplay"),message=document.getElementById("message"),scoreText=document.getElementById("scoreText"),missText=document.getElementById("missText"),modeText=document.getElementById("modeText"),modeBtn=document.getElementById("modeBtn"),soundBtn=document.getElementById("soundBtn"),overlay=document.getElementById("overlay");

function injectAd(container,src,w,h){
  if(!container)return;
  container.innerHTML="";
  const ifr=document.createElement("iframe");
  ifr.width=w;ifr.height=h;ifr.scrolling="no";
  ifr.setAttribute("frameborder","0");
  ifr.style.cssText="border:0;display:block;margin:0 auto;overflow:hidden;width:"+w+"px;height:"+h+"px;";
  container.appendChild(ifr);
  try{
    const d=ifr.contentWindow.document;
    d.open();
    d.write('<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width='+w+'"><style>html,body{margin:0;padding:0;overflow:hidden;text-align:center}</style></head><body><scr'+'ipt src="'+src+'"></scr'+'ipt></body></html>');
    d.close();
  }catch(e){}
}

function speak(text){
  if(!soundOn||!("speechSynthesis" in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";u.rate=.9;u.pitch=1.15;
  speechSynthesis.speak(u);
}

function buildKeyboard(){
  kanaGridEl.innerHTML="";
  const grid=mode==="hira"?hiraGrid:kataGrid;
  grid.flat().forEach(ch=>{
    const d=document.createElement("div");
    if(!ch){d.className="kanaBtn empty";d.textContent=""}
    else{d.className="kanaBtn";d.textContent=ch;d.onclick=()=>pressKana(ch)}
    kanaGridEl.appendChild(d);
  });
}

function getAnswer(){return mode==="hira"?current.hira:current.kata}

function updateDisplay(){
  const a=getAnswer();
  const chars=[...input],slots=[];
  for(let i=0;i<a.length;i++)slots.push(chars[i]||"＿");
  answerDisplay.textContent=slots.join(" ");
  circleHint.textContent="○".repeat(a.length);
  scoreText.textContent="せいかい "+score;
  missText.textContent="ミス "+miss+"/"+maxMiss;
  modeText.textContent=mode==="hira"?"ひらがな":"カタカナ";
  modeBtn.textContent=mode==="hira"?"カタカナ":"ひらがな";
  soundBtn.textContent=soundOn?"おとON":"おとOFF";
  soundBtn.className=soundOn?"on":"";
}

function nextQuestion(){
  clearCheckTimer();
  input="";
  let pool;
  if(gameLevel==="easy"){
    pool=questions.filter(q=>q.level==="easy");
  }else if(gameLevel==="normal"){
    pool=questions.filter(q=>q.level==="easy"||q.level==="normal");
  }else{
    pool=questions;
  }
  if(used.length>=pool.length)used=[];
  let q;
  do{q=pool[Math.floor(Math.random()*pool.length)]}while(used.includes(q.hira)&&pool.length>1);
  used.push(q.hira);
  current=q;
  emojiEl.textContent=current.emoji;
  message.textContent="なまえをいれてね";
  updateDisplay();
  speak("これはなにかな");
}

function clearCheckTimer(){
  if(checkTimer){
    clearTimeout(checkTimer);
    checkTimer=null;
  }
}

function scheduleCheckIfFull(){
  clearCheckTimer();
  const a=getAnswer();
  if(input.length===a.length){
    checkTimer=setTimeout(()=>{
      checkTimer=null;
      checkIfFull();
    },900);
  }
}

function pressKana(ch){
  if(!current)return;
  const a=getAnswer();
  if(input.length>=a.length)return;
  clearCheckTimer();
  input+=ch;
  speak(ch);
  updateDisplay();
  scheduleCheckIfFull();
}

function replaceLastChar(map, failText){
  if(!input)return;
  clearCheckTimer();
  const arr=[...input];
  const last=arr[arr.length-1];
  if(map[last]){
    arr[arr.length-1]=map[last];
    input=arr.join("");
    speak(map[last]);
    updateDisplay();
    scheduleCheckIfFull();
  }else{
    message.textContent=failText;
    speak(failText);
  }
}

function addLongVowel(){
  if(!current)return;
  const a=getAnswer();
  if(input.length>=a.length)return;
  clearCheckTimer();
  input+="ー";
  speak("のばす");
  updateDisplay();
  scheduleCheckIfFull();
}

function showAnswer(){
  clearCheckTimer();
  if(!current)return;
  const a=getAnswer();
  input=a;
  message.textContent="こたえは「"+a+"」";
  updateDisplay();
  speak("こたえは、"+a);
}

function checkIfFull(){
  const a=getAnswer();
  if(input.length===a.length){
    if(input===a){
      score++;
      message.textContent="せいかい！";
      speak("せいかい。"+a);
      setTimeout(nextQuestion,900);
    }else{
      miss++;
      message.textContent="もういちど";
      speak("もういちど");
      input="";
      setTimeout(updateDisplay,280);
      if(miss>=maxMiss)setTimeout(gameOver,500);
    }
  }
}

window.startGame=function startGame(level){
  clearCheckTimer();
  gameLevel=level;score=0;miss=0;used=[];
  overlay.style.display="none";
  nextQuestion();
}

function showTitle(){
  clearCheckTimer();
  input="";
  overlay.style.display="flex";
  overlay.innerHTML=`<div class="panel">
    <h1>こども<br>もじタッチ</h1>
    <p>えをみて、したのもじをタッチしよう。<br>ひらがな・カタカナのれんしゅうができます。</p>

    <div class="startButtons">
      <button class="bigButton" type="button" onclick="startGame('easy')">やさしい</button>
      <button class="bigButton" type="button" onclick="startGame('normal')">ふつう</button>
      <button class="bigButton" type="button" onclick="startGame('hard')">むずかしい</button>
    </div>

    <div class="ad-large" id="titleAdBox">
      <!-- おおきいこうこく 300×250 -->
    </div>
  </div>`;

  const adBox=document.getElementById("titleAdBox");
  injectAd(adBox,"https://adm.shinobi.jp/s/7b3a5ddb43f4cb9eadb45b1c506ee384",300,250);
}

function gameOver(){
  overlay.style.display="flex";
  overlay.innerHTML=`<div class="panel">
    <h1>おしまい</h1>
    <p>せいかい：<b>${score}</b>もん</p>
    <p>もういちどチャレンジしてみよう！</p>

    <div class="startButtons">
      <button class="bigButton" type="button" onclick="startGame('easy')">やさしい</button>
      <button class="bigButton" type="button" onclick="startGame('normal')">ふつう</button>
      <button class="bigButton" type="button" onclick="startGame('hard')">むずかしい</button>
    </div>

    <div class="ad-large" id="gameOverAd">
      <!-- おおきいこうこく 300×250 -->
    </div>
  </div>`;

  const adBox=document.getElementById("gameOverAd");
  injectAd(adBox,"https://adm.shinobi.jp/s/7b3a5ddb43f4cb9eadb45b1c506ee384",300,250);

  speak("おしまい。もういちどやってみよう");
}
modeBtn.onclick=()=>{
  clearCheckTimer();
  mode=mode==="hira"?"kata":"hira";
  input="";
  buildKeyboard();
  updateDisplay();
  speak(mode==="hira"?"ひらがな":"カタカナ");
};
soundBtn.onclick=()=>{
  soundOn=!soundOn;
  if(!soundOn&&"speechSynthesis" in window)speechSynthesis.cancel();
  updateDisplay();
};
document.getElementById("backBtn").onclick=()=>{clearCheckTimer();input=input.slice(0,-1);updateDisplay()};
document.getElementById("clearBtn").onclick=()=>{clearCheckTimer();input="";updateDisplay()};
document.getElementById("nextBtn").onclick=()=>nextQuestion();
document.getElementById("answerBtn").onclick=()=>showAnswer();
document.getElementById("titleBtn").onclick=()=>showTitle();
document.getElementById("dakutenBtn").onclick=()=>replaceLastChar(dakutenMap,"つけられないよ");
document.getElementById("handakuBtn").onclick=()=>replaceLastChar(handakuMap,"つけられないよ");
document.getElementById("smallBtn").onclick=()=>replaceLastChar(smallMap,"小さくできないよ");
document.getElementById("longBtn").onclick=()=>addLongVowel();


document.addEventListener("click",(e)=>{
  if(e.target && e.target.matches(".bigButton")){
    const text=e.target.textContent.trim();
    if(text==="やさしい") startGame("easy");
    if(text==="ふつう") startGame("normal");
    if(text==="むずかしい") startGame("hard");
  }
});

buildKeyboard();
current=questions[0];
updateDisplay();
</script>
